<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <!-- Background -->
  <rect width="300" height="100" rx="12" fill="#1a1a2e"/>
  
  <!-- Musical note icon -->
  <g transform="translate(15, 10)">
    <!-- Note stem -->
    <rect x="38" y="18" width="3.5" height="40" rx="2" fill="#c9a84c"/>
    <!-- Note head -->
    <ellipse cx="33" cy="58" rx="9" ry="7" fill="#c9a84c" transform="rotate(-15, 33, 58)"/>
    <!-- Flag on stem -->
    <path d="M41.5 18 Q62 28 52 42" stroke="#c9a84c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Second flag -->
    <path d="M41.5 28 Q60 37 51 50" stroke="#c9a84c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Decorative line under icon -->
  <rect x="15" y="88" width="60" height="2" rx="1" fill="#c9a84c" opacity="0.4"/>

  <!-- SwarLipi text -->
  <text x="88" y="48" 
        font-family="Georgia, serif" 
        font-size="28" 
        font-weight="bold"
        fill="#c9a84c"
        letter-spacing="1">SwarLipi</text>

  <!-- Vault text -->
  <text x="88" y="74" 
        font-family="Georgia, serif" 
        font-size="22"
        fill="#f0e6d3"
        letter-spacing="4">VAULT</text>

  <!-- Decorative dot between words -->
  <circle cx="80" cy="60" r="2" fill="#c9a84c" opacity="0.6"/>

  <!-- Right decorative line -->
  <rect x="88" y="80" width="185" height="1.5" rx="1" fill="#c9a84c" opacity="0.3"/>
</svg>
